services:
  - type: web
    name: bibliosys-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bibliosys-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  - type: web
    name: bibliosys-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        value: https://bibliosys-backend.onrender.com/api

databases:
  - name: bibliosys-db
    plan: free
    databaseName: bibliosys
    user: bibliosys_user

